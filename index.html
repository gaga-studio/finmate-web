<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FinMate Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="quest-polish.css" />
</head>
<body>
  <main class="phone-shell">
    <header class="topbar">
      <div class="brand">FinMate<span></span></div>
      <div class="wallet"><b>🪙</b><span id="coins">12,450</span><button id="coinAdd" aria-label="코인 추가">＋</button></div>
    </header>

    <section class="quest-head">
      <h1>퀘스트</h1>
      <div class="tabs" role="tablist">
        <button class="active">오늘 <i id="badge">3</i></button><button>진행 중</button><button>추천</button><button>완료</button>
      </div>
    </section>

    <section class="game-card" aria-label="자동 전투 게임">
      <div class="game-hud">
        <div class="profile"><div class="portrait mini-sprite rabbit"></div><p><b>모험가 토토</b><span>LV. 35</span></p><div class="xp"><i></i></div></div>
        <div class="resources"><span>🪙 128,450</span><span>💎 2,350</span><button>☰</button></div>
      </div>

      <div class="stage-title"><small>✧ STAGE 4-12 ✧</small><b>과소비</b></div>
      <div class="boss-hp"><i id="bossBar"></i><span id="bossHpText">100%</span></div>
      <button id="autoToggle" class="auto on">AUTO<small>자동</small></button>
      <button id="dailyQuest" class="daily"><b>📜 일일 퀘스트</b><span>몬스터 100마리 처치</span><em><i id="dailyCount">75</i>/100</em></button>

      <div class="battlefield" id="battlefield">
        <div class="fighter bear" data-hero="bear"><div class="sprite"></div><div class="unit-hp"><i></i></div></div>
        <div class="fighter seal" data-hero="seal"><div class="sprite"></div><div class="unit-hp"><i></i></div></div>
        <div class="fighter bird" data-hero="bird"><div class="sprite"></div><div class="unit-hp"><i></i></div></div>
        <div class="fighter rabbit" data-hero="rabbit"><div class="sprite"></div><div class="unit-hp"><i></i></div></div>
        <div class="boss" id="boss"><div class="straw"></div><div class="ice">◇ ◇</div><div class="boss-face"><i></i><span>︵</span><i></i></div><b>과소비</b></div>
        <div class="effect" id="effect"></div>
      </div>

      <div class="party">
        <button class="hero-card" data-skill="⚡"><div class="portrait mini-sprite bear"></div><i></i><span>⚡</span></button>
        <button class="hero-card" data-skill="🛡️"><div class="portrait mini-sprite seal"></div><i></i><span>🛡️</span></button>
        <button class="hero-card" data-skill="🔮"><div class="portrait mini-sprite bird"></div><i></i><span>🔮</span></button>
        <button class="hero-card" data-skill="✚"><div class="portrait mini-sprite rabbit"></div><i></i><span>✚</span></button>
        <button class="reward" id="reward"><b>보상</b><span>🎁</span><small id="rewardTimer">00:00:12</small><em>받기</em></button>
      </div>
    </section>

    <section class="summary">
      <article><div><b>오늘 완료한 퀘스트</b><span id="doneText">3/5개</span></div><div class="stamps"><i>☕<small>✓</small></i><i>🐷<small>✓</small></i><i>📊<small>✓</small></i><i class="locked">🎁</i></div><p>모두 완료하고 보상 받으세요!</p></article>
      <article class="streak"><div><b>연속 달성</b></div><strong>🔥 <span id="streak">7</span>일</strong><div class="king">🐻<i>♛</i></div><p>최고 기록 12일</p></article>
    </section>

    <nav class="bottom-nav"><button>⌂<span>홈</span></button><button>♧<span>메이트</span></button><button class="active">▣<span>퀘스트</span></button><button>🎁<span>로드맵</span></button></nav>
    <div id="toast" class="toast"></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
