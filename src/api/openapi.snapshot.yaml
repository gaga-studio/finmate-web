      required: true
      schema:
        type: string
    CosmeticId:
      name: cosmeticId
      in: path
      required: true
      schema:
        type: string
    QuestId:
      name: questId
      in: path
      required: true
      schema:
        type: string
    RecordDate:
      name: date
      in: path
      required: true
      schema:
        type: string
        format: date
    CharacterReportType:
      name: reportType
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/CharacterReportType"
    Month:
      name: month
      in: query
      required: true
      schema:
        type: string
        pattern: ^\d{4}-(0[1-9]|1[0-2])$
  headers:
    RefreshCookie:
      description: Rotated opaque refresh token with secure browser attributes.
      x-cookie-name: finmate_refresh
      x-http-only: true
      x-same-site: Lax
      x-path: /api/v1/auth
      x-max-age-seconds: 2592000
      schema:
        type: string
        pattern: ^finmate_refresh=[^;]+;(?=.*Path=/api/v1/auth)(?=.*Max-Age=2592000)(?=.*HttpOnly)(?=.*SameSite=Lax).*$
      example: finmate_refresh=opaque-token; Path=/api/v1/auth; Max-Age=2592000;
        HttpOnly; SameSite=Lax; Secure
    ClearedRefreshCookie:
      description: Revokes the browser cookie with the same attributes and Max-Age=0.
      x-cookie-name: finmate_refresh
      x-http-only: true
      x-same-site: Lax
      x-path: /api/v1/auth
      x-max-age-seconds: 0
      x-expires-immediately: true
      schema:
        type: string
        pattern: ^finmate_refresh=;(?=.*Path=/api/v1/auth)(?=.*Max-Age=0)(?=.*HttpOnly)(?=.*SameSite=Lax).*$
      example: finmate_refresh=; Path=/api/v1/auth; Max-Age=0; HttpOnly; SameSite=Lax;
        Secure
  responses:
    AuthSessionResponse:
      description: Authenticated email/password session.
      headers:
        Set-Cookie:
          $ref: "#/components/headers/RefreshCookie"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthSession"
          examples:
            default:
              externalValue: examples/auth-session-response.json
    ProblemResponse:
      description: RFC 7807 problem.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    GoalRequired:
      description: An active goal is required for this command.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            goalRequired:
              externalValue: examples/goal-required-problem.json
    ActiveGoalConflict:
      description: A main goal is already active.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://finmate.example/problems/active-main-goal-exists
            title: Active main goal exists
            status: 409
            detail: Complete or cancel the current goal before confirming another.
            instance: /api/v1/goals
            code: ACTIVE_MAIN_GOAL_EXISTS
            traceId: trace-goal-conflict
    RoutineImportConflict:
      description: Goal is missing or an active routine requires explicit replacement.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            goalRequired:
              externalValue: examples/goal-required-problem.json
            activeBuild:
              value:
                type: https://finmate.example/problems/active-routine-build-exists
                title: Active routine build exists
                status: 409
                detail: Confirm replacement through the replacement command.
                instance: /api/v1/routine-adaptations/adapt-1/candidates/candidate-1/import
                code: ACTIVE_ROUTINE_BUILD_EXISTS
                traceId: trace-routine-conflict
    RoutineRecommendationConflict:
      description: A goal is missing or the synthetic source data is stale.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            goalRequired:
              externalValue: examples/goal-required-problem.json
            dataStale:
              externalValue: examples/data-stale-problem.json
    DataStale:
      description: The last synthetic calculation is too old for this command.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            stale:
              externalValue: examples/data-stale-problem.json
    DataInsufficient:
      description: Synthetic source periods or classifications are insufficient.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            insufficient:
              externalValue: examples/data-insufficient-problem.json
