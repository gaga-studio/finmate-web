        - raid
        - calculationVersion
        - dataState
        - lastSyncedAt
      properties:
        fixtureId:
          type: string
          enum:
            - EUROPE_TRAVEL_JANUARY
        initialGoalAmountKrw:
          $ref: "#/components/schemas/KrwAmount"
        targetGoalAmountKrw:
          $ref: "#/components/schemas/KrwAmount"
        currentFrameIndex:
          type: integer
          minimum: 0
          maximum: 5
        frames:
          type: array
          minItems: 6
          maxItems: 6
          items:
            $ref: "#/components/schemas/DemoTimelineFrame"
        mainGoal:
          $ref: "#/components/schemas/UserGoal"
        raid:
          $ref: "#/components/schemas/RaidView"
        calculationVersion:
          type: string
        dataState:
          $ref: "#/components/schemas/DataState"
        lastSyncedAt:
          $ref: "#/components/schemas/NullableTimestamp"
    FieldError:
      type: object
      additionalProperties: false
      required:
        - field
        - message
      properties:
        field:
          type: string
        message:
          type: string
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - title
        - status
        - detail
        - instance
        - code
        - traceId
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - UNAUTHORIZED
            - INVALID_CREDENTIALS
            - DUPLICATE_EMAIL
            - NOT_FOUND
            - ACTIVE_MAIN_GOAL_EXISTS
            - GOAL_REQUIRED
            - DATA_STALE
            - DATA_INSUFFICIENT
            - ACTIVE_ROUTINE_BUILD_EXISTS
            - DEMO_PROFILE_REQUIRED
        traceId:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
