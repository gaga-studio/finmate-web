openapi: 3.0.3
info:
  title: FinMate vNext API
  version: 3.1.0
  description: 합성 금융데이터 기반 FinMate RPG MVP의 공식 API 계약입니다. 프론트엔드와 백엔드는 이 명세를 단일
    원본으로 사용하며, 명세에 포함된 기능이 모두 런타임에 구현되었다는 의미는 아닙니다.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: 이메일 회원가입, 로그인, 토큰 갱신과 로그아웃
  - name: Disclosure
    description: 익명 금융 프로필의 항목별 공개 동의와 미리보기
  - name: Onboarding
    description: 생활맥락·금융성향·합성 마이데이터 연결을 포함한 온보딩
  - name: Goal
    description: 사용자가 직접 확정하는 단일 주 목표
  - name: Home
    description: 홈 레이드, 목표 진행률과 캐릭터별 금융 리포트
  - name: Mate
    description: 친구 현황, 유사그룹, 익명 모험가 탐색과 비교
  - name: Routine
    description: 모험가 루틴의 개인화 추천, 적용과 교체
  - name: ProductInfo
    description: 루틴과 분리된 검수 완료 하나 금융상품 정보
  - name: Quest
    description: 퀘스트 조회, 수락, 완료와 금융데이터 검증 대기
  - name: Record
    description: 월간 여정, 일별 금융활동과 사용자 회고
  - name: Reward
    description: 환금 불가능한 내부 포인트와 확정형 꾸미기 보상
  - name: Demo
    description: 합성 사용자 전용 결정적 시연 타임라인
paths:
  /auth/signup:
    post:
      tags:
        - Auth
      operationId: signUp
      summary: 이메일로 회원가입
      description: 이메일과 비밀번호로 계정을 만들고 액세스 토큰 및 갱신 쿠키를 발급합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
            examples:
              default:
                externalValue: examples/auth-signup-request.json
      responses:
        "201":
          $ref: "#/components/responses/AuthSessionResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /auth/login:
    post:
      tags:
        - Auth
      operationId: logIn
      summary: 로그인
      description: 가입한 이메일과 비밀번호를 검증하고 인증 세션을 발급합니다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              default:
                externalValue: examples/auth-login-request.json
      responses:
        "200":
          $ref: "#/components/responses/AuthSessionResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshSession
      summary: 인증 세션 갱신
      description: 브라우저의 갱신 쿠키를 회전하고 새로운 액세스 토큰을 발급합니다.
      security: []
      parameters:
        - $ref: "#/components/parameters/RefreshCookie"
      responses:
        "200":
          $ref: "#/components/responses/AuthSessionResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logOut
      summary: 로그아웃
      description: 갱신 세션을 폐기하고 브라우저 쿠키를 삭제합니다.
      parameters:
        - $ref: "#/components/parameters/RefreshCookie"
      responses:
        "204":
          description: 갱신 세션을 폐기하고 브라우저 쿠키를 삭제했습니다.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/ClearedRefreshCookie"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /me/disclosures:
    get:
      tags:
        - Disclosure
      operationId: getDisclosureConsent
      summary: 금융정보 공개 동의 조회
      description: 현재 사용자의 항목별 공개 동의 상태와 버전을 조회합니다.
      responses:
        "200":
          description: 현재 항목별 공개 동의입니다. 신규 사용자의 기본값은 모두 비공개입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureConsent"
              examples:
                active:
                  externalValue: examples/disclosure-consent-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
    put:
      tags:
        - Disclosure
      operationId: updateDisclosureConsent
      summary: 금융정보 공개 동의 변경
      description: 미리보기에서 확인하고 명시적으로 동의한 정확값 항목만 공개합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclosureRequest"
            examples:
              selectedFields:
                externalValue: examples/disclosure-request.json
      responses:
        "200":
          description: 적용된 버전 관리형 공개 동의입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureConsent"
              examples:
                active:
                  externalValue: examples/disclosure-consent-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
    delete:
      tags:
        - Disclosure
      operationId: withdrawDisclosureConsent
      summary: 금융정보 공개 동의 철회
      description: 공개를 즉시 중단하고 선택했던 모든 항목을 탐색 및 추천 조회에서 제거합니다.
      responses:
        "204":
          description: 공개 동의를 철회하고 동의 버전을 갱신했습니다.
        default:
          $ref: "#/components/responses/ProblemResponse"
  /me/disclosures/preview:
    post:
      tags:
        - Disclosure
      operationId: previewDisclosure
      summary: 공개될 금융정보 미리보기
      description: 저장하기 전에 선택한 공개 항목의 실제 노출 형태와 공개 불가 항목을 확인합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclosureRequest"
            examples:
              selectedFields:
                externalValue: examples/disclosure-request.json
      responses:
        "200":
          description: 정확값 공개 미리보기와 절대 공개할 수 없는 항목 목록입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosurePreview"
              examples:
                selectedFields:
                  externalValue: examples/disclosure-preview-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /onboarding:
    get:
      tags:
        - Onboarding
      operationId: getOnboarding
      summary: 온보딩 상태 조회
      description: 작성 중인 온보딩 초안 또는 완료 상태를 조회합니다.
      responses:
        "200":
          description: 현재 온보딩 초안 또는 완료 상태입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingView"
        default:
          $ref: "#/components/responses/ProblemResponse"
    put:
      tags:
        - Onboarding
      operationId: completeOnboarding
      summary: 온보딩 완료
      description: 생활맥락과 금융성향을 저장하고 목표 없이 탐색 가능한 상태로 온보딩을 완료합니다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingRequest"
            examples:
              exploreOnly:
                externalValue: examples/onboarding-request.json
      responses:
        "200":
          description: 탐색 전용 상태로 온보딩을 완료했습니다. 주 목표는 나중에 확정할 수 있습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingView"
              examples:
                exploreOnly:
                  externalValue: examples/onboarding-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /goals:
    post:
      tags:
        - Goal
      operationId: confirmUserGoal
      summary: 주 목표 확정
      description: 사용자가 검토한 목표명, 현재값, 목표값과 목표 월을 하나의 활성 주 목표로 확정합니다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmUserGoalRequest"
            examples:
              europeTravel:
                externalValue: examples/goal-confirm-request.json
      responses:
        "201":
          description: 사용자에게 하나만 허용되는 활성 주 목표입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoal"
              examples:
                europeTravel:
                  externalValue: examples/goal-confirm-response.json
        "409":
          $ref: "#/components/responses/ActiveGoalConflict"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /goals/active:
    get:
      tags:
        - Goal
      operationId: getActiveUserGoal
      summary: 활성 주 목표 조회
      description: 사용자가 현재 진행 중인 단일 주 목표를 조회합니다.
      responses:
        "200":
          description: 현재 활성화된 단일 주 목표입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoal"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /home:
    get:
      tags:
        - Home
      operationId: getHome
      summary: 홈 화면 조회
      description: 목표 설정 여부에 따라 탐색 홈 또는 레이드가 활성화된 홈 정보를 반환합니다.
      responses:
        "200":
          description: 탐색 전용 또는 목표 활성 상태의 홈 화면 데이터입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeView"
              examples:
                active:
                  externalValue: examples/home-response.json
                exploreOnly:
                  externalValue: examples/home-explore-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /raids/current:
    get:
      tags:
        - Home
      operationId: getCurrentRaid
      summary: 현재 레이드 조회
      description: 검증된 금융데이터로 계산한 현재 목표 진행률과 레이드 상태를 조회합니다.
      responses:
        "200":
          description: 금융 근거 데이터로 계산한 현재 레이드 상태입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaidView"
              examples:
                active:
                  externalValue: examples/raid-response.json
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /reports/characters/{reportType}:
    get:
      tags:
        - Home
      operationId: getCharacterReport
      summary: 캐릭터별 금융 리포트 조회
      description: 소비·저축·투자 판단·퀘스트 경험치 중 선택한 캐릭터 영역의 리포트를 조회합니다.
      parameters:
        - $ref: "#/components/parameters/CharacterReportType"
      responses:
        "200":
          description: 네 캐릭터와 연결된 금융 리포트 중 하나입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterReport"
              examples:
                saving:
                  externalValue: examples/character-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /reports/monthly:
    get:
      tags:
        - Record
      operationId: getMonthlyReport
      summary: 월간 금융 리포트 조회
      description: 지정한 월의 금융 변화와 퀘스트·루틴 활동을 요약해 조회합니다.
      parameters:
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: 월간 금융 및 활동 요약 리포트입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"
              examples:
                july:
                  externalValue: examples/monthly-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/friends/overview:
    get:
      tags:
        - Mate
      operationId: getMateFriendOverview
      summary: 친구 현황 조회
      description: 합성 친구들의 오늘 퀘스트 완료 상태와 금액 없는 비교 요약을 조회합니다.
      responses:
        "200":
          description: 읽기 전용 합성 친구 진행 현황과 비교 요약입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateFriendOverview"
              examples:
                default:
                  externalValue: examples/mate-friend-overview-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/friends/feed:
    get:
      tags:
        - Mate
      operationId: getMateFriendFeed
      summary: 친구 금융 근황 피드 조회
      description: 정확 금액을 제외한 합성 친구의 금융 습관 근황을 조회합니다.
      responses:
        "200":
          description: 금액을 노출하지 않는 합성 친구 활동 피드입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateFriendFeed"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/friends/streaks:
    get:
      tags:
        - Mate
      operationId: getMateFriendStreaks
      summary: 친구 연속기록 조회
      description: 친구와 함께 유지한 습관의 연속기록을 읽기 전용으로 조회합니다.
      responses:
        "200":
          description: 금액 없는 합성 공동 연속기록입니다. MVP에서는 읽기만 가능합니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateStreakPage"
              examples:
                default:
                  externalValue: examples/mate-friend-streaks-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups:
    get:
      tags:
        - Mate
      operationId: listMateGroups
      summary: 유사 메이트 그룹 목록 조회
      description: 사용자의 생활맥락과 금융 기준선에 맞는 유사그룹 및 시연용 합성 그룹을 조회합니다.
      responses:
        "200":
          description: 추천 조건을 충족한 그룹과 명시적인 합성 시연 그룹입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateGroupPage"
              examples:
                groups:
                  externalValue: examples/mate-groups-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/report:
    get:
      tags:
        - Mate
      operationId: getMateGroupReport
      summary: 유사그룹 리포트 조회
      description: 선택한 그룹의 익명 범위값, 금융 스탯 분포와 목표 달성 모험가 미리보기를 조회합니다.
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: 익명 그룹의 범위, 분포와 목표 달성 모험가 미리보기입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateGroupReport"
              examples:
                default:
                  externalValue: examples/mate-group-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers:
    get:
      tags:
        - Mate
      operationId: listRecommendedAdventurers
      summary: 추천 익명 모험가 목록 조회
      description: 선택한 유사그룹 안에서 공개·품질 조건을 통과한 익명 모험가를 조회합니다.
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: 선택한 그룹 안에서 추천된 익명 모험가 목록입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendedAdventurerPage"
              examples:
                adventurers:
                  externalValue: examples/adventurers-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}:
    get:
      tags:
        - Mate
      operationId: getRecommendedAdventurer
      summary: 추천 익명 모험가 상세 조회
      description: 익명 모험가가 동의한 생활맥락, 루틴과 검증 기준일을 조회합니다.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
      responses:
        "200":
          description: 익명 모험가 한 명이 공개에 동의한 맥락 정보입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendedAdventurerCard"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}/report:
    get:
      tags:
        - Mate
      operationId: getAdventurerReport
      summary: 모험가 비교 리포트 조회
      description: 나와 모험가의 범위화된 지표와 해당 모험가가 유지한 루틴의 근거를 비교합니다.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
      responses:
        "200":
          description: 범위 기반 비교와 모험가 루틴의 유지 근거입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdventurerReport"
              examples:
                default:
                  externalValue: examples/adventurer-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}/financial-profile:
    get:
      tags:
        - Mate
        - Disclosure
      operationId: getPublicFinancialProfile
      summary: 공개 금융 프로필 조회
      description: 활성화된 항목별 동의로 선택된 합성 금융 정확값만 조회합니다.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
      responses:
        "200":
          description: 동의한 영역만 포함합니다. 상품과 매매 데이터는 정보 열람용입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicFinancialProfile"
              examples:
                fullConsent:
                  externalValue: examples/public-financial-profile-response.json
        "404":
          description: 프로필이 없거나 금융정보 공개 동의가 철회되었습니다.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}/routines/{routineId}:
    get:
      tags:
        - Mate
      operationId: getAdventurerRoutine
      summary: 모험가 루틴 상세 조회
      description: 그룹과 익명 모험가 맥락 안에서 선택한 루틴의 행동, 빈도와 유지기간을 조회합니다.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
        - $ref: "#/components/parameters/RoutineId"
      responses:
        "200":
          description: 그룹 및 익명 모험가 맥락을 포함한 루틴 상세입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdventurerRoutine"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/explore/search:
    post:
      tags:
        - Mate
      operationId: searchMateAdventurers
      summary: 조건별 익명 모험가 탐색
      description: 승인된 필터 조합으로 합성 익명 모험가를 검색합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MateExploreSearchRequest"
      responses:
        "200":
          description: 승인된 필터 조합에 해당하는 읽기 전용 합성 모험가 목록입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendedAdventurerPage"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-adaptations:
    post:
      tags:
        - Routine
      operationId: createRoutineRecommendation
      summary: 개인화 루틴 추천 생성
      description: 선택한 모험가 루틴을 내 금융 기준선에 맞춰 추천안 하나와 선택 가능한 강도안으로 계산합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutineRecommendationRequest"
      responses:
        "201":
          description: 우선 추천 후보 하나와 선택 가능한 강도별 대안입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineRecommendation"
              examples:
                saving:
                  externalValue: examples/routine-recommendation-response.json
        "409":
          $ref: "#/components/responses/RoutineRecommendationConflict"
        "422":
          $ref: "#/components/responses/DataInsufficient"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-adaptations/{adaptationId}/candidates/{candidateId}/import:
    post:
      tags:
        - Routine
      operationId: importRoutineAdaptationCandidate
      summary: 개인화 루틴 적용
      description: 활성 루틴이 없을 때 선택한 개인화 후보를 새 활성 루틴으로 적용합니다.
      parameters:
        - $ref: "#/components/parameters/AdaptationId"
        - $ref: "#/components/parameters/CandidateId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: 기존 활성 루틴이 없을 때 생성된 새 활성 루틴입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveRoutineBuild"
        "409":
          $ref: "#/components/responses/RoutineImportConflict"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-builds/active:
    get:
      tags:
        - Routine
      operationId: getActiveRoutineBuild
      summary: 활성 루틴 조회
      description: 사용자가 현재 적용 중인 단일 활성 루틴을 조회합니다.
      responses:
        "200":
          description: 사용자에게 하나만 허용되는 현재 활성 루틴입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveRoutineBuild"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-builds/active/replacement:
    post:
      tags:
        - Routine
      operationId: replaceActiveRoutineBuild
      summary: 활성 루틴 교체
      description: 사용자 확인 후 기존 루틴을 보관하고 선택한 후보를 새 활성 루틴으로 원자적으로 교체합니다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceActiveRoutineBuildRequest"
      responses:
        "200":
          description: 기존 루틴을 보관하고 후보 루틴을 하나의 트랜잭션으로 활성화했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineBuildReplacement"
              examples:
                replaced:
                  externalValue: examples/routine-build-replacement-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /hana-products/{productId}:
    get:
      tags:
        - ProductInfo
      operationId: getRelatedHanaProductInfo
      summary: 관련 하나 상품 정보 조회
      description: 또래·루틴 데이터와 분리된 검수 완료 금융상품 정보를 열람합니다. 조회는 성장이나 보상에 영향을 주지 않습니다.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: 또래 및 루틴 데이터와 분리된 검수 완료 정보성 상품 항목입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatedHanaProductInfo"
              examples:
                default:
                  externalValue: examples/hana-product-info-response.json
        "409":
          $ref: "#/components/responses/GoalRequired"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests:
    get:
      tags:
        - Quest
      operationId: listQuests
      summary: 퀘스트 화면 조회
      description: 참여 가능, 진행 중, 금융데이터 반영 대기와 완료 퀘스트를 구분해 조회합니다.
      responses:
        "200":
          description: 퀘스트 탭 전체 화면 데이터입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestPage"
              examples:
                active:
                  externalValue: examples/quest-list-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests/{questId}:
    get:
      tags:
        - Quest
      operationId: getQuest
      summary: 퀘스트 상세 조회
      description: 퀘스트의 현재값, 목표값, 기간, 검증 방식과 XP 보상을 조회합니다.
      parameters:
        - $ref: "#/components/parameters/QuestId"
      responses:
        "200":
          description: 퀘스트 상세와 완료 검증 규칙입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests/{questId}/accept:
    post:
      tags:
        - Quest
      operationId: acceptQuest
      summary: 퀘스트 수락
      description: 참여 가능한 퀘스트를 진행 중 상태로 변경합니다. 금융 스탯과 레이드는 변경하지 않습니다.
      parameters:
        - $ref: "#/components/parameters/QuestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 금융 스탯 변경 없이 수락된 퀘스트입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestAcceptance"
              examples:
                default:
                  externalValue: examples/quest-accept-response.json
        "409":
          $ref: "#/components/responses/GoalRequired"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests/{questId}/complete:
    post:
      tags:
        - Quest
      operationId: completeQuest
      summary: 퀘스트 완료 처리
      description: 행동형 퀘스트에는 XP와 내부 보상을 지급하고, 금융 근거가 필요한 퀘스트는 데이터 재계산을 기다립니다.
      parameters:
        - $ref: "#/components/parameters/QuestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 행동 완료로 XP와 내부 보상만 지급했으며 금융 스탯은 변경하지 않았습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestCompletion"
        "202":
          description: 합성 마이데이터 재계산을 통해 금융 근거가 확인되기를 기다립니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestCompletion"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /records:
    get:
      tags:
        - Record
      operationId: listDailyRecords
      summary: 기간별 일일 기록 목록 조회
      description: 시작일과 종료일 사이의 금융활동, 퀘스트와 회고를 날짜순으로 조회합니다.
      parameters:
        - name: from
          in: query
          required: true
          description: 조회 시작일(포함)
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          description: 조회 종료일(포함)
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 기간 내 일일 기록 페이지입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecordPage"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /records/journey:
    get:
      tags:
        - Record
      operationId: getDailyJourneyMonth
      summary: 월간 금융 여정 조회
      description: 지정한 월의 날짜별 대표 활동과 보조 활동을 순서가 보장된 발판 여정으로 조회합니다.
      parameters:
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: 날짜 순서가 보장된 월간 발판형 금융 여정입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyJourneyMonth"
              examples:
                july:
                  externalValue: examples/daily-journey-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /records/{date}:
    get:
      tags:
        - Record
      operationId: getDailyRecord
      summary: 일일 기록 상세 조회
      description: 선택한 날짜의 수입·지출·저축·투자·퀘스트와 예산 상태를 조회합니다.
      parameters:
        - $ref: "#/components/parameters/RecordDate"
      responses:
        "200":
          description: 일일 기록 바텀시트에 표시할 상세 데이터입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecord"
              examples:
                day:
                  externalValue: examples/daily-record-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
    put:
      tags:
        - Record
      operationId: saveDailyReflection
      summary: 일일 회고 저장
      description: 선택한 날짜에 사용자 회고를 저장합니다. 금융 계산 결과에는 영향을 주지 않습니다.
      parameters:
        - $ref: "#/components/parameters/RecordDate"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveReflectionRequest"
      responses:
        "200":
          description: 회고가 저장된 일일 기록입니다. 금융 계산값은 변경되지 않습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecord"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /rewards/points:
    get:
      tags:
        - Reward
      operationId: getPointLedger
      summary: 내부 포인트 내역 조회
      description: 양도와 환금이 불가능한 내부 포인트 잔액 및 적립·사용 내역을 조회합니다.
      responses:
        "200":
          description: 양도할 수 없는 내부 포인트 잔액과 원장입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointLedgerView"
              examples:
                default:
                  externalValue: examples/point-ledger-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /rewards/cosmetics:
    get:
      tags:
        - Reward
      operationId: listCosmetics
      summary: 꾸미기 상품 목록 조회
      description: 현금·쿠폰·랜덤 상자 없이 가격이 확정된 캐릭터 꾸미기 항목만 조회합니다.
      responses:
        "200":
          description: 확정형 꾸미기 항목만 포함하며 현금, 쿠폰, 랜덤 상자와 리포트 잠금은 없습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CosmeticCatalogView"
              examples:
                default:
                  externalValue: examples/cosmetic-catalog-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /rewards/cosmetics/{cosmeticId}/purchase:
    post:
      tags:
        - Reward
      operationId: purchaseCosmetic
      summary: 꾸미기 상품 구매
      description: 내부 포인트로 선택한 확정형 꾸미기 항목을 멱등하게 구매합니다.
      parameters:
        - $ref: "#/components/parameters/CosmeticId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: 내부 포인트로 처리한 멱등한 확정형 꾸미기 구매 결과입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CosmeticPurchase"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /demo/timeline/advance:
    post:
      tags:
        - Demo
      operationId: advanceDemoTimeline
      summary: 시연 타임라인 진행
      description: demo 프로필과 합성 사용자에게만 등록되는 시연 전용 API입니다.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceDemoTimelineRequest"
      responses:
        "200":
          description: 결정적으로 재현되는 6단계 합성 타임라인과 현재 화면 데이터입니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoTimelineView"
              examples:
                advanced:
                  externalValue: examples/demo-timeline-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: 동일한 명령의 중복 처리를 막기 위한 클라이언트 생성 고유 키입니다.
      schema:
        type: string
        minLength: 16
        maxLength: 128
    RefreshCookie:
      name: finmate_refresh
      in: cookie
      required: true
      description: 브라우저 쿠키에만 보관하는 불투명한 30일 갱신 토큰입니다.
      schema:
        type: string
        minLength: 32
    GroupId:
      name: groupId
      in: path
      required: true
      description: 유사그룹 식별자
      schema:
        type: string
    AdventurerId:
      name: adventurerId
      in: path
      required: true
      description: 익명 모험가 식별자
      schema:
        type: string
    RoutineId:
      name: routineId
      in: path
      required: true
      description: 모험가 루틴 식별자
      schema:
        type: string
    AdaptationId:
      name: adaptationId
      in: path
      required: true
      description: 루틴 개인화 결과 식별자
      schema:
        type: string
    CandidateId:
      name: candidateId
      in: path
      required: true
      description: 개인화 루틴 후보 식별자
      schema:
        type: string
    ProductId:
      name: productId
      in: path
      required: true
      description: 검수 상품 식별자
      schema:
        type: string
    CosmeticId:
      name: cosmeticId
      in: path
      required: true
      description: 꾸미기 상품 식별자
      schema:
        type: string
    QuestId:
      name: questId
      in: path
      required: true
      description: 퀘스트 식별자
      schema:
        type: string
    RecordDate:
      name: date
      in: path
      required: true
      description: 조회할 기록 날짜
      schema:
        type: string
        format: date
    CharacterReportType:
      name: reportType
      in: path
      required: true
      description: 조회할 캐릭터 금융 리포트 영역
      schema:
        $ref: "#/components/schemas/CharacterReportType"
    Month:
      name: month
      in: query
      required: true
      description: 조회 월(YYYY-MM)
      schema:
        type: string
        pattern: ^\d{4}-(0[1-9]|1[0-2])$
  headers:
    RefreshCookie:
      description: 안전한 브라우저 속성과 함께 회전된 불투명 갱신 토큰입니다.
      x-cookie-name: finmate_refresh
      x-http-only: true
      x-same-site: Lax
      x-path: /api/v1/auth
      x-max-age-seconds: 2592000
      schema:
        type: string
        pattern: ^finmate_refresh=[^;]+;(?=.*Path=/api/v1/auth)(?=.*Max-Age=2592000)(?=.*HttpOnly)(?=.*SameSite=Lax).*$
      example: finmate_refresh=opaque-token; Path=/api/v1/auth; Max-Age=2592000;
        HttpOnly; SameSite=Lax; Secure
    ClearedRefreshCookie:
      description: 동일한 속성과 Max-Age=0을 사용해 브라우저 쿠키를 폐기합니다.
      x-cookie-name: finmate_refresh
      x-http-only: true
      x-same-site: Lax
      x-path: /api/v1/auth
      x-max-age-seconds: 0
      x-expires-immediately: true
      schema:
        type: string
        pattern: ^finmate_refresh=;(?=.*Path=/api/v1/auth)(?=.*Max-Age=0)(?=.*HttpOnly)(?=.*SameSite=Lax).*$
      example: finmate_refresh=; Path=/api/v1/auth; Max-Age=0; HttpOnly; SameSite=Lax;
        Secure
  responses:
    AuthSessionResponse:
      description: 인증된 이메일·비밀번호 세션입니다.
      headers:
        Set-Cookie:
          $ref: "#/components/headers/RefreshCookie"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthSession"
          examples:
            default:
              externalValue: examples/auth-session-response.json
    ProblemResponse:
      description: RFC 7807 형식의 표준 오류 응답입니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    GoalRequired:
      description: 이 명령을 실행하려면 활성 주 목표가 필요합니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            goalRequired:
              externalValue: examples/goal-required-problem.json
    ActiveGoalConflict:
      description: 이미 활성화된 주 목표가 있습니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          example:
            type: https://finmate.example/problems/active-main-goal-exists
            title: Active main goal exists
            status: 409
            detail: Complete or cancel the current goal before confirming another.
            instance: /api/v1/goals
            code: ACTIVE_MAIN_GOAL_EXISTS
            traceId: trace-goal-conflict
    RoutineImportConflict:
      description: 활성 목표가 없거나 기존 활성 루틴을 명시적으로 교체해야 합니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            goalRequired:
              externalValue: examples/goal-required-problem.json
            activeBuild:
              value:
                type: https://finmate.example/problems/active-routine-build-exists
                title: Active routine build exists
                status: 409
                detail: Confirm replacement through the replacement command.
                instance: /api/v1/routine-adaptations/adapt-1/candidates/candidate-1/import
                code: ACTIVE_ROUTINE_BUILD_EXISTS
                traceId: trace-routine-conflict
    RoutineRecommendationConflict:
      description: 활성 목표가 없거나 합성 원천 데이터가 오래되었습니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            goalRequired:
              externalValue: examples/goal-required-problem.json
            dataStale:
              externalValue: examples/data-stale-problem.json
    DataStale:
      description: 마지막 합성데이터 계산 시점이 오래되어 이 명령을 실행할 수 없습니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            stale:
              externalValue: examples/data-stale-problem.json
    DataInsufficient:
      description: 합성 원천 데이터의 기간 또는 분류 정보가 계산하기에 부족합니다.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            insufficient:
              externalValue: examples/data-insufficient-problem.json
