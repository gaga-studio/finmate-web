    RoutineAdaptationCandidate:
      type: object
      additionalProperties: false
      required:
        - candidateId
        - difficulty
        - domain
        - title
        - targetKind
        - steps
      properties:
        candidateId:
          type: string
        difficulty:
          $ref: "#/components/schemas/Difficulty"
        domain:
          $ref: "#/components/schemas/AdaptationDomain"
        title:
          type: string
        targetKind:
          type: string
          enum:
            - AMOUNT_KRW
            - BASIS_POINTS
            - BEHAVIOR
        targetAmountKrw:
          $ref: "#/components/schemas/KrwAmount"
        targetBasisPoints:
          $ref: "#/components/schemas/BasisPoints"
        behaviorTarget:
          type: string
        durationDays:
          type: integer
          minimum: 1
          maximum: 365
        steps:
          type: array
          minItems: 1
          items:
            type: string
      oneOf:
        - title: SpendingOrSavingAmount
          required:
            - targetAmountKrw
          properties:
            domain:
              type: string
              enum:
                - SPENDING
                - SAVING
            targetKind:
              type: string
              enum:
                - AMOUNT_KRW
          not:
            anyOf:
              - required:
                  - targetBasisPoints
              - required:
                  - behaviorTarget
        - title: SpendingOrSavingRatio
          required:
            - targetBasisPoints
          properties:
            domain:
              type: string
              enum:
                - SPENDING
                - SAVING
            targetKind:
              type: string
              enum:
                - BASIS_POINTS
          not:
            anyOf:
              - required:
                  - targetAmountKrw
              - required:
                  - behaviorTarget
        - title: ApprovedBehavior
          required:
            - behaviorTarget
          properties:
            domain:
              type: string
              enum:
                - SPENDING
                - SAVING
                - INVESTMENT_JUDGMENT
            targetKind:
              type: string
              enum:
                - BEHAVIOR
          not:
            anyOf:
              - required:
                  - targetAmountKrw
              - required:
                  - targetBasisPoints
