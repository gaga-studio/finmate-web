openapi: 3.0.3
info:
  title: FinMate vNext API
  version: 3.1.0
  description: Canonical contract for the synthetic-data FinMate RPG MVP.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Disclosure
  - name: Onboarding
  - name: Goal
  - name: Home
  - name: Mate
  - name: Routine
  - name: ProductInfo
  - name: Quest
  - name: Record
  - name: Reward
  - name: Demo
paths:
  /auth/signup:
    post:
      tags:
        - Auth
      operationId: signUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
            examples:
              default:
                externalValue: examples/auth-signup-request.json
      responses:
        "201":
          $ref: "#/components/responses/AuthSessionResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /auth/login:
    post:
      tags:
        - Auth
      operationId: logIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              default:
                externalValue: examples/auth-login-request.json
      responses:
        "200":
          $ref: "#/components/responses/AuthSessionResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /auth/refresh:
    post:
      tags:
        - Auth
      operationId: refreshSession
      security: []
      parameters:
        - $ref: "#/components/parameters/RefreshCookie"
      responses:
        "200":
          $ref: "#/components/responses/AuthSessionResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /auth/logout:
    post:
      tags:
        - Auth
      operationId: logOut
      parameters:
        - $ref: "#/components/parameters/RefreshCookie"
      responses:
        "204":
          description: Refresh session revoked and browser cookie cleared.
          headers:
            Set-Cookie:
              $ref: "#/components/headers/ClearedRefreshCookie"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /me/disclosures:
    get:
      tags:
        - Disclosure
      operationId: getDisclosureConsent
      responses:
        "200":
          description: Current granular disclosure consent. New users are opted out by
            default.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureConsent"
              examples:
                active:
                  externalValue: examples/disclosure-consent-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
    put:
      tags:
        - Disclosure
      operationId: updateDisclosureConsent
      description: Activates only the fields that were previewed and explicitly
        confirmed as exact values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclosureRequest"
            examples:
              selectedFields:
                externalValue: examples/disclosure-request.json
      responses:
        "200":
          description: Active versioned disclosure consent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosureConsent"
              examples:
                active:
                  externalValue: examples/disclosure-consent-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
    delete:
      tags:
        - Disclosure
      operationId: withdrawDisclosureConsent
      description: Immediately opts out and removes every selected field from
        discovery and recommendation reads.
      responses:
        "204":
          description: Disclosure withdrawn and version advanced.
        default:
          $ref: "#/components/responses/ProblemResponse"
  /me/disclosures/preview:
    post:
      tags:
        - Disclosure
      operationId: previewDisclosure
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisclosureRequest"
            examples:
              selectedFields:
                externalValue: examples/disclosure-request.json
      responses:
        "200":
          description: Exact-value preview plus fields that can never be disclosed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisclosurePreview"
              examples:
                selectedFields:
                  externalValue: examples/disclosure-preview-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /onboarding:
    get:
      tags:
        - Onboarding
      operationId: getOnboarding
      responses:
        "200":
          description: Current onboarding draft or completed state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingView"
        default:
          $ref: "#/components/responses/ProblemResponse"
    put:
      tags:
        - Onboarding
      operationId: completeOnboarding
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOnboardingRequest"
            examples:
              exploreOnly:
                externalValue: examples/onboarding-request.json
      responses:
        "200":
          description: Onboarding completed in explore-only mode; a goal may be confirmed
            later.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingView"
              examples:
                exploreOnly:
                  externalValue: examples/onboarding-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /goals:
    post:
      tags:
        - Goal
      operationId: confirmUserGoal
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmUserGoalRequest"
            examples:
              europeTravel:
                externalValue: examples/goal-confirm-request.json
      responses:
        "201":
          description: The user's one active main goal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoal"
              examples:
                europeTravel:
                  externalValue: examples/goal-confirm-response.json
        "409":
          $ref: "#/components/responses/ActiveGoalConflict"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /goals/active:
    get:
      tags:
        - Goal
      operationId: getActiveUserGoal
      responses:
        "200":
          description: The one active main goal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserGoal"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /home:
    get:
      tags:
        - Home
      operationId: getHome
      responses:
        "200":
          description: Explore-only or goal-active home projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeView"
              examples:
                active:
                  externalValue: examples/home-response.json
                exploreOnly:
                  externalValue: examples/home-explore-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /raids/current:
    get:
      tags:
        - Home
      operationId: getCurrentRaid
      responses:
        "200":
          description: Current raid projection calculated from financial evidence.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RaidView"
              examples:
                active:
                  externalValue: examples/raid-response.json
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /reports/characters/{reportType}:
    get:
      tags:
        - Home
      operationId: getCharacterReport
      parameters:
        - $ref: "#/components/parameters/CharacterReportType"
      responses:
        "200":
          description: One of the four character-backed financial reports.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterReport"
              examples:
                saving:
                  externalValue: examples/character-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /reports/monthly:
    get:
      tags:
        - Record
      operationId: getMonthlyReport
      parameters:
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: Monthly financial and activity report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"
              examples:
                july:
                  externalValue: examples/monthly-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/friends/overview:
    get:
      tags:
        - Mate
      operationId: getMateFriendOverview
      responses:
        "200":
          description: Synthetic read-only friend progress and comparison summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateFriendOverview"
              examples:
                default:
                  externalValue: examples/mate-friend-overview-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/friends/feed:
    get:
      tags:
        - Mate
      operationId: getMateFriendFeed
      responses:
        "200":
          description: Amount-free synthetic friend activity feed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateFriendFeed"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/friends/streaks:
    get:
      tags:
        - Mate
      operationId: getMateFriendStreaks
      responses:
        "200":
          description: Amount-free synthetic shared streaks. This resource is read-only in
            MVP.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateStreakPage"
              examples:
                default:
                  externalValue: examples/mate-friend-streaks-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups:
    get:
      tags:
        - Mate
      operationId: listMateGroups
      responses:
        "200":
          description: Eligible groups and explicit synthetic demo groups.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateGroupPage"
              examples:
                groups:
                  externalValue: examples/mate-groups-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/report:
    get:
      tags:
        - Mate
      operationId: getMateGroupReport
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Anonymous group ranges, distributions, and goal-achiever preview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MateGroupReport"
              examples:
                default:
                  externalValue: examples/mate-group-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers:
    get:
      tags:
        - Mate
      operationId: listRecommendedAdventurers
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Anonymous adventurers recommended inside the selected group.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendedAdventurerPage"
              examples:
                adventurers:
                  externalValue: examples/adventurers-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}:
    get:
      tags:
        - Mate
      operationId: getRecommendedAdventurer
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
      responses:
        "200":
          description: One anonymous adventurer's approved public context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendedAdventurerCard"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}/report:
    get:
      tags:
        - Mate
      operationId: getAdventurerReport
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
      responses:
        "200":
          description: Range-based comparison and evidence for the adventurer's routines.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdventurerReport"
              examples:
                default:
                  externalValue: examples/adventurer-report-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}/financial-profile:
    get:
      tags:
        - Mate
        - Disclosure
      operationId: getPublicFinancialProfile
      description: Exact synthetic financial values selected by an active, granular
        disclosure consent.
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
      responses:
        "200":
          description: Only consented sections are present. Product and trade data are
            information-only.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicFinancialProfile"
              examples:
                fullConsent:
                  externalValue: examples/public-financial-profile-response.json
        "404":
          description: Profile missing or its disclosure consent has been withdrawn.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/groups/{groupId}/adventurers/{adventurerId}/routines/{routineId}:
    get:
      tags:
        - Mate
      operationId: getAdventurerRoutine
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - $ref: "#/components/parameters/AdventurerId"
        - $ref: "#/components/parameters/RoutineId"
      responses:
        "200":
          description: Routine detail in group and anonymous adventurer context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdventurerRoutine"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /mate/explore/search:
    post:
      tags:
        - Mate
      operationId: searchMateAdventurers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MateExploreSearchRequest"
      responses:
        "200":
          description: Synthetic read-only adventurers for an approved filter combination.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendedAdventurerPage"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-adaptations:
    post:
      tags:
        - Routine
      operationId: createRoutineRecommendation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoutineRecommendationRequest"
      responses:
        "201":
          description: One recommended candidate plus optional intensity alternatives.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineRecommendation"
              examples:
                saving:
                  externalValue: examples/routine-recommendation-response.json
        "409":
          $ref: "#/components/responses/RoutineRecommendationConflict"
        "422":
          $ref: "#/components/responses/DataInsufficient"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-adaptations/{adaptationId}/candidates/{candidateId}/import:
    post:
      tags:
        - Routine
      operationId: importRoutineAdaptationCandidate
      parameters:
        - $ref: "#/components/parameters/AdaptationId"
        - $ref: "#/components/parameters/CandidateId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: New active routine build when none exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveRoutineBuild"
        "409":
          $ref: "#/components/responses/RoutineImportConflict"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-builds/active:
    get:
      tags:
        - Routine
      operationId: getActiveRoutineBuild
      responses:
        "200":
          description: The one global active routine build.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveRoutineBuild"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /routine-builds/active/replacement:
    post:
      tags:
        - Routine
      operationId: replaceActiveRoutineBuild
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceActiveRoutineBuildRequest"
      responses:
        "200":
          description: Previous build archived and candidate build activated atomically.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutineBuildReplacement"
              examples:
                replaced:
                  externalValue: examples/routine-build-replacement-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /hana-products/{productId}:
    get:
      tags:
        - ProductInfo
      operationId: getRelatedHanaProductInfo
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Reviewed informational catalog item, separate from peer and routine
            data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelatedHanaProductInfo"
              examples:
                default:
                  externalValue: examples/hana-product-info-response.json
        "409":
          $ref: "#/components/responses/GoalRequired"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests:
    get:
      tags:
        - Quest
      operationId: listQuests
      responses:
        "200":
          description: Quest tab projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestPage"
              examples:
                active:
                  externalValue: examples/quest-list-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests/{questId}:
    get:
      tags:
        - Quest
      operationId: getQuest
      parameters:
        - $ref: "#/components/parameters/QuestId"
      responses:
        "200":
          description: Quest detail and verification rule.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests/{questId}/accept:
    post:
      tags:
        - Quest
      operationId: acceptQuest
      parameters:
        - $ref: "#/components/parameters/QuestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Available quest accepted without changing financial stats.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestAcceptance"
              examples:
                default:
                  externalValue: examples/quest-accept-response.json
        "409":
          $ref: "#/components/responses/GoalRequired"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /quests/{questId}/complete:
    post:
      tags:
        - Quest
      operationId: completeQuest
      parameters:
        - $ref: "#/components/parameters/QuestId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Behavior completion grants XP/internal rewards without
            financial-stat change.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestCompletion"
        "202":
          description: Financial evidence awaits synthetic MyData recalculation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestCompletion"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /records:
    get:
      tags:
        - Record
      operationId: listDailyRecords
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily record page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecordPage"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /records/journey:
    get:
      tags:
        - Record
      operationId: getDailyJourneyMonth
      parameters:
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: Ordered monthly stepping-stone journey.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyJourneyMonth"
              examples:
                july:
                  externalValue: examples/daily-journey-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /records/{date}:
    get:
      tags:
        - Record
      operationId: getDailyRecord
      parameters:
        - $ref: "#/components/parameters/RecordDate"
      responses:
        "200":
          description: One daily record for the bottom sheet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecord"
              examples:
                day:
                  externalValue: examples/daily-record-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
    put:
      tags:
        - Record
      operationId: saveDailyReflection
      parameters:
        - $ref: "#/components/parameters/RecordDate"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveReflectionRequest"
      responses:
        "200":
          description: Daily record with saved reflection; calculations are unchanged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyRecord"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /rewards/points:
    get:
      tags:
        - Reward
      operationId: getPointLedger
      responses:
        "200":
          description: Non-transferable internal point balance and ledger.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointLedgerView"
              examples:
                default:
                  externalValue: examples/point-ledger-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /rewards/cosmetics:
    get:
      tags:
        - Reward
      operationId: listCosmetics
      responses:
        "200":
          description: Fixed cosmetic items only; no cash, coupon, random box, or report
            lock.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CosmeticCatalogView"
              examples:
                default:
                  externalValue: examples/cosmetic-catalog-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
  /rewards/cosmetics/{cosmeticId}/purchase:
    post:
      tags:
        - Reward
      operationId: purchaseCosmetic
      parameters:
        - $ref: "#/components/parameters/CosmeticId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Idempotent fixed cosmetic purchase with internal points.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CosmeticPurchase"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /demo/timeline/advance:
    post:
      tags:
        - Demo
      operationId: advanceDemoTimeline
      description: Registered only under the demo profile and for synthetic users.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceDemoTimelineRequest"
      responses:
        "200":
          description: Deterministic six-frame synthetic timeline and current projections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoTimelineView"
              examples:
                advanced:
                  externalValue: examples/demo-timeline-response.json
        default:
          $ref: "#/components/responses/ProblemResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    RefreshCookie:
      name: finmate_refresh
      in: cookie
      required: true
      description: Opaque 30-day refresh token held only in a browser cookie.
      schema:
        type: string
        minLength: 32
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
    AdventurerId:
      name: adventurerId
      in: path
      required: true
      schema:
        type: string
    RoutineId:
      name: routineId
      in: path
      required: true
      schema:
        type: string
    AdaptationId:
      name: adaptationId
      in: path
      required: true
      schema:
        type: string
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
    ProductId:
      name: productId
