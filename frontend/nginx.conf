server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public";
  }
}
